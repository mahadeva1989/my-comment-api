apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comments-ui
  template:
    metadata:
      labels:
        app: comments-ui
    spec:
      containers:
        - name: comments-ui
          image: commentsappregistry.azurecr.io/comments-ui:v7
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: comments-ui-service
spec:
  selector:
    app: comments-ui
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
